version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: canteen-backend
    ports:
      - "3001:3001"
    volumes:
      - ./backend/data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: canteen-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  demo:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: canteen-demo
    volumes:
      - ./backend/data:/app/data
    command: ["node", "demo.js"]
    depends_on:
      - backend
    profiles:
      - demo
